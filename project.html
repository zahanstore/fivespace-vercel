<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Project — Five Space World</title>
  <link rel="icon" type="image/png" href="/assets/logo.png" />
  <meta name="description" content="Project — Five Space World architecture practice. Civic, cultural, institutional and commercial architecture at civilisational scale." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/main.css" />
  <style>
    /* ── Dark mode readability ── */
    [data-theme="dark"] body                          { background-color: #0D1B26; }
    [data-theme="dark"] #projectContent h1            { color: #C8DFF0 !important; }
    [data-theme="dark"] .section-label                { color: #6FA8C8; }
    [data-theme="dark"] .project-meta-item .label     { color: #6FA8C8; }
    [data-theme="dark"] .project-meta-item .value     { color: #C8DFF0; }
    [data-theme="dark"] .project-meta-bar             { border-color: rgba(255,255,255,0.1); }
    [data-theme="dark"] #projectContent a             { color: #7EB8D8 !important; }
    [data-theme="dark"] figcaption                    { color: #6FA8C8 !important; }
    [data-theme="dark"] #projectContent div           { color: #B8D0E0; }
    [data-theme="dark"] .project-meta-bar,
    [data-theme="dark"] .project-meta-item,
    [data-theme="dark"] .gallery-grid                 { color: inherit; }

    p { font-weight: 500; }

    /* ── Gallery zoom cursor ── */
    .gallery-grid figure {
      cursor: zoom-in;
      overflow: hidden;
      position: relative;
      margin: 0;
    }
    .gallery-grid figure img {
      transition: transform 0.4s ease;
      width: 100%;
      display: block;
    }
    .gallery-grid figure:hover img { transform: scale(1.03); }
    .project-hero-img { cursor: zoom-in; }

    /* ── Lightbox ── */
    .lb-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.96);
      z-index: 9999;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    .lb-overlay.open { display: flex; }
    .lb-img {
      max-width: 100%;
      max-height: 88svh;
      object-fit: contain;
      border-radius: 2px;
      box-shadow: 0 8px 60px rgba(0,0,0,0.8);
      user-select: none;
      pointer-events: none;
    }
    .lb-btn {
      position: fixed;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.18);
      background: rgba(255,255,255,0.1);
      color: #fff;
      cursor: pointer;
      transition: background 0.2s;
      z-index: 10001;
    }
    .lb-btn:hover { background: rgba(255,255,255,0.28); }
    .lb-close { top: 1.1rem; right: 1.1rem; width:2.6rem; height:2.6rem; font-size:1.1rem; }
    .lb-prev  { top:50%; left:0.8rem;  transform:translateY(-50%); width:2.8rem; height:2.8rem; font-size:1.1rem; }
    .lb-next  { top:50%; right:0.8rem; transform:translateY(-50%); width:2.8rem; height:2.8rem; font-size:1.1rem; }
    .lb-caption {
      position: fixed;
      bottom: 1.4rem; left: 50%; transform: translateX(-50%);
      font-size: 0.7rem; letter-spacing: 0.12em; text-transform: uppercase;
      color: rgba(255,255,255,0.55); text-align: center; max-width: 80vw;
      z-index: 10001;
    }
    .lb-counter {
      position: fixed;
      top: 1.3rem; left: 50%; transform: translateX(-50%);
      font-size: 0.68rem; letter-spacing: 0.15em;
      color: rgba(255,255,255,0.45);
      z-index: 10001;
    }
  </style>
</head>
<body>

  <!-- Nav injected by components.js -->

  <div id="projectContent">
    <div style="min-height:60vh; display:flex; align-items:center; justify-content:center;">
      <p style="font-family:var(--font-display); font-size:1.5rem; font-style:italic; color:var(--sage);">Loading…</p>
    </div>
  </div>

  <!-- ── Lightbox overlay ── -->
  <div class="lb-overlay" id="lb" role="dialog" aria-modal="true" aria-label="Image viewer">
    <button class="lb-btn lb-close" id="lbClose" aria-label="Close">&#x2715;</button>
    <button class="lb-btn lb-prev"  id="lbPrev"  aria-label="Previous">&#8592;</button>
    <img    class="lb-img"          id="lbImg"   src="" alt="" />
    <button class="lb-btn lb-next"  id="lbNext"  aria-label="Next">&#8594;</button>
    <div class="lb-caption"         id="lbCap"></div>
    <div class="lb-counter"         id="lbCount"></div>
  </div>

  <button class="back-top" id="backTop" aria-label="Back to top">↑</button>

  <script>
    window.addEventListener('load', () => document.body.classList.add('loaded'));
    if (document.readyState === 'complete') document.body.classList.add('loaded');
  </script>
  <script src="env.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/components.js"></script>

  <!-- Lightbox logic (runs before DOMContentLoaded so initLightbox is ready) -->
  <script>
    (function() {
      var imgs = [], cur = 0;
      var lb      = document.getElementById('lb');
      var lbImg   = document.getElementById('lbImg');
      var lbCap   = document.getElementById('lbCap');
      var lbCount = document.getElementById('lbCount');
      var lbPrev  = document.getElementById('lbPrev');
      var lbNext  = document.getElementById('lbNext');

      function show(i) {
        cur = ((i % imgs.length) + imgs.length) % imgs.length;
        lbImg.src           = imgs[cur].src;
        lbImg.alt           = imgs[cur].cap;
        lbCap.textContent   = imgs[cur].cap;
        lbCount.textContent = (cur + 1) + ' / ' + imgs.length;
        lb.classList.add('open');
        document.body.style.overflow = 'hidden';
      }
      function close() {
        lb.classList.remove('open');
        document.body.style.overflow = '';
        lbImg.src = '';
      }

      document.getElementById('lbClose').onclick = close;
      lbPrev.onclick = function(e) { e.stopPropagation(); show(cur - 1); };
      lbNext.onclick = function(e) { e.stopPropagation(); show(cur + 1); };
      lb.addEventListener('click', function(e) { if (e.target === lb) close(); });

      // Keyboard
      document.addEventListener('keydown', function(e) {
        if (!lb.classList.contains('open')) return;
        if (e.key === 'Escape')     close();
        if (e.key === 'ArrowLeft')  show(cur - 1);
        if (e.key === 'ArrowRight') show(cur + 1);
      });

      // Swipe
      var tx = 0;
      lb.addEventListener('touchstart', function(e) { tx = e.touches[0].clientX; }, { passive: true });
      lb.addEventListener('touchend', function(e) {
        var dx = e.changedTouches[0].clientX - tx;
        if (Math.abs(dx) > 50) dx < 0 ? show(cur + 1) : show(cur - 1);
      });

      // Called after project HTML renders into DOM
      window.initLightbox = function() {
        imgs = [];

        var hero = document.querySelector('.project-hero-img');
        if (hero) {
          var hi = imgs.length;
          imgs.push({ src: hero.src, cap: hero.alt || '' });
          hero.addEventListener('click', function() { show(hi); });
        }

        document.querySelectorAll('.gallery-grid figure img').forEach(function(img) {
          var fc  = img.closest('figure').querySelector('figcaption');
          var idx = imgs.length;
          imgs.push({ src: img.src, cap: fc ? fc.textContent.trim() : '' });
          img.closest('figure').addEventListener('click', function() { show(idx); });
        });

        var multi = imgs.length > 1;
        lbPrev.style.display = multi ? '' : 'none';
        lbNext.style.display = multi ? '' : 'none';
      };
    })();
  </script>

  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      initComponents({ activePage: 'projects' });

      const backTop = document.getElementById('backTop');
      window.addEventListener('scroll', () => backTop.classList.toggle('visible', window.scrollY > 400));
      backTop.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));

      const slug      = new URLSearchParams(window.location.search).get('slug');
      const container = document.getElementById('projectContent');

      if (!slug) {
        container.innerHTML = `<div style="text-align:center; padding:8rem var(--gutter);">
          <h1 style="font-family:var(--font-display); font-size:3rem; font-weight:400;">Project not found</h1>
          <a href="projects" class="btn-outline" style="display:inline-block; margin-top:2rem;">All Projects</a>
        </div>`;
        return;
      }

      try {
        const p = await getProjectBySlug(slug);

        document.title = `${p.title} — Five Space World`;
        const meta = document.querySelector('meta[name="description"]');
        if (meta) meta.content = p.description ? p.description.substring(0, 160) : p.title;

        const gallery = Array.isArray(p.gallery) ? p.gallery : [];

        container.innerHTML = `
          ${p.main_image_url ? `
          <img class="project-hero-img"
            src="${p.main_image_url}"
            alt="${p.title}"
            style="padding-top:4rem;" />
          ` : '<div style="padding-top:5rem;"></div>'}

          <div class="wrap" style="padding-top:var(--space-md); padding-bottom:var(--space-xl);">
            <a href="projects" style="font-size:0.68rem; letter-spacing:0.2em; text-transform:uppercase; display:inline-flex; align-items:center; gap:0.4rem; margin-bottom:var(--space-md);">
              ← All Projects
            </a>

            <p class="section-label">${p.category || 'Project'}</p>
            <h1 style="font-family:var(--font-display); font-size:clamp(2.5rem,6vw,5rem); font-weight:600; margin-bottom:var(--space-sm);">${p.title}</h1>

            <div class="project-meta-bar">
              ${p.location  ? `<div class="project-meta-item"><div class="label">Location</div><div class="value">${p.location}</div></div>`  : ''}
              ${p.year      ? `<div class="project-meta-item"><div class="label">Year</div><div class="value">${p.year}</div></div>`            : ''}
              ${p.category  ? `<div class="project-meta-item"><div class="label">Type</div><div class="value">${p.category}</div></div>`       : ''}
              ${p.materials ? `<div class="project-meta-item"><div class="label">Materials</div><div class="value">${p.materials}</div></div>` : ''}
              ${p.area      ? `<div class="project-meta-item"><div class="label">Area</div><div class="value">${p.area}</div></div>`            : ''}
            </div>

            ${p.description ? `
            <div class="project-description" style="max-width:680px; font-size:1.05rem; line-height:1.9; margin-bottom:var(--space-lg); font-weight:500;">
              ${mdToHtml(p.description)}
            </div>` : ''}

            ${gallery.length ? `
            <div class="gallery-grid">
              ${gallery.map(img => `
                <figure>
                  <img src="${img.url}" alt="${img.caption || p.title}" loading="lazy" />
                  ${img.caption ? `<figcaption style="font-size:0.7rem; letter-spacing:0.12em; text-transform:uppercase; margin-top:0.4rem;">${img.caption}</figcaption>` : ''}
                </figure>
              `).join('')}
            </div>` : ''}
          </div>
        `;

        // Wire up lightbox once content is in the DOM
        if (window.initLightbox) window.initLightbox();

      } catch (err) {
        container.innerHTML = `<div style="text-align:center; padding:8rem var(--gutter);">
          <h1 style="font-family:var(--font-display); font-size:3rem; font-weight:400;">Project not found</h1>
          <a href="projects" class="btn-outline" style="display:inline-block; margin-top:2rem;">All Projects</a>
        </div>`;
      }
    });
  </script>
</body>
</html>
