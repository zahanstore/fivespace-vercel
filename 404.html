<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page Not Found — Five Space World</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/main.css" />
</head>
<body class="loaded">
  <!-- Nav injected by components.js -->
  <div style="min-height:100svh; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:var(--gutter);">
    <p style="font-size:0.65rem; letter-spacing:0.35em; text-transform:uppercase; color:var(--sky-lt); margin-bottom:1rem;">404</p>
    <h1 style="font-family:var(--font-display); font-size:clamp(3rem,8vw,6rem); font-weight:300; color:var(--sky-dk); line-height:1.1;">Page not found</h1>
    <p style="color:var(--slate); margin:var(--space-sm) 0 var(--space-lg); max-width:400px; line-height:1.8;">
      The page you are looking for has moved or does not exist.
    </p>
    <a href="/" class="btn-outline">Return Home</a>
  </div>
</body>
</html>
